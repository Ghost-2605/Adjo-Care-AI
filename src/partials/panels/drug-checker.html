<section class="panel" id="tab-drugs">
  <div class="panel-inner">
    <div class="panel-hero">
      <h1>Drug Interaction Checker</h1>
      <p>Enter medications to check for dangerous interactions.</p>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-icon red"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5a5.5 5.5 0 110 11A5.5 5.5 0 017 1.5z" stroke="currentColor" stroke-width="1.2"/><path d="M7 4.5v3.5M7 10h.01" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></div><span>Enter Medications</span></div>
      <div class="drug-chip-area" id="drug-chip-area">
        <input id="drug-hidden-input" style="position:absolute;opacity:0;pointer-events:none;">
        <span id="drug-placeholder" style="font-size:.8rem;color:var(--text3);padding:.2rem .4rem;">Type a drug name and press Enter…</span>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;">
        <input class="form-input" id="drug-text-input" type="text" placeholder="e.g. Paracetamol, Warfarin, Aspirin…" style="flex:1">
        <button id="add-drug-btn" style="background:var(--accent);color:#fff;padding:.55rem 1rem;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;border:none;cursor:pointer;flex-shrink:0;">Add</button>
      </div>
      <button class="analyze-btn" id="drug-check-btn" style="margin-top:.5rem;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8h12M8 2v12" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
        Check Interactions
      </button>
    </div>
    <div id="drug-result" style="display:none">
      <div class="card-header" style="margin-bottom:.5rem;"><span style="font-size:.875rem;font-weight:500;">Interaction Result</span></div>
      <div id="drug-result-content" class="drug-interaction-result"></div>
    </div>
  </div>
</section>
